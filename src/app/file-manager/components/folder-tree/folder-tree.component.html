<p-tree
  [value]="visibleNodes()"
  selectionMode="single"
  [selection]="selectedTreeNode()"
  loadingMode="icon"
  (onNodeExpand)="handleExpand($event)"
  (onNodeCollapse)="handleCollapse($event)"
  (onNodeSelect)="handleSelect($event)"
  styleClass="fm-tree"
>
  <ng-template let-node pTemplate="default">
    <span class="fm-tree-node">
      <pr-file-system-prime-icon name="folder" />
      <span class="fm-tree-label">{{ node.label }}</span>
    </span>
  </ng-template>
</p-tree>
