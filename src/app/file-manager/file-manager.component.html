<div class="fm-root">
  <header class="fm-header">
    <h1 class="fm-title">{{ config.libraryRootName }}</h1>
  </header>

  <div class="fm-toolbar-row">
    <app-nav-toolbar
      [canGoBack]="navigation.canGoBack()"
      [canGoForward]="navigation.canGoForward()"
      [canGoUp]="navigation.canGoUp()"
      (back)="navigation.back()"
      (forward)="navigation.forward()"
      (up)="onUp()"
      (refresh)="onRefresh()"
    />

    <app-path-bar
      class="fm-breadcrumb"
      [segments]="navigation.pathSegments()"
      [projectLabel]="projectLabel()"
      [editablePath]="currentEditablePath()"
      [editing]="pathEditing()"
      [resolving]="fileSystem.isResolvingPath()"
      [pathError]="pathError()"
      (segmentClicked)="onSegmentClicked($event)"
      (pathSubmitted)="onPathSubmitted($event)"
      (editRequested)="onEditRequested()"
      (editCancelled)="onEditCancelled()"
    />

    <span class="fm-search">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Search File"
        [disabled]="true"
        pTooltip="Search coming soon"
        tooltipPosition="bottom"
        aria-label="Search files"
        data-testid="fm-search"
      />
    </span>

    <div class="fm-actions">
      <!-- TODO: enable with the create-folder US. -->
      <button
        pButton
        type="button"
        icon="pi pi-folder-plus"
        label="New folder"
        [disabled]="true"
        pTooltip="Not available yet"
        tooltipPosition="bottom"
        severity="secondary"
        [text]="true"
        data-testid="fm-btn-new-folder"
      ></button>
      <!-- TODO: enable with the upload US. -->
      <button
        pButton
        type="button"
        icon="pi pi-upload"
        label="Upload file"
        [disabled]="true"
        pTooltip="Not available yet"
        tooltipPosition="bottom"
        severity="secondary"
        [text]="true"
        data-testid="fm-btn-upload"
      ></button>
    </div>
  </div>

  <p-splitter
    class="fm-body"
    [panelSizes]="[24, 76]"
    [minSizes]="[12, 30]"
    [gutterSize]="6"
    [style]="{ height: '100%' }"
  >
    <ng-template #panel>
      <aside class="fm-tree-pane" aria-label="Folder trees">
        <section class="fm-tree-section">
          <h2 class="fm-tree-section-title">{{ projectLabel() }} - {{ listLabels.marketing }}</h2>
          <app-folder-tree
            [nodes]="marketingTree()"
            [currentFolderId]="navigation.currentFolderId()"
            [folderIdsWithLoadingChildren]="fileSystem.folderIdsWithLoadingChildren()"
            (nodeSelected)="onTreeNodeSelected($event)"
            (nodeExpanded)="onTreeNodeExpanded($event)"
            (nodeCollapsed)="onTreeNodeCollapsed($event)"
          />
        </section>
        <section class="fm-tree-section">
          <h2 class="fm-tree-section-title">{{ projectLabel() }} - {{ listLabels.execution }}</h2>
          <app-folder-tree
            [nodes]="executionTree()"
            [currentFolderId]="navigation.currentFolderId()"
            [folderIdsWithLoadingChildren]="fileSystem.folderIdsWithLoadingChildren()"
            (nodeSelected)="onTreeNodeSelected($event)"
            (nodeExpanded)="onTreeNodeExpanded($event)"
            (nodeCollapsed)="onTreeNodeCollapsed($event)"
          />
        </section>
      </aside>
    </ng-template>
    <ng-template #panel>
      <main class="fm-table-pane" aria-label="Folder contents">
        @if (navigation.navigationError(); as navError) {
          <div class="fm-unavailable" role="status">
            <i class="pi pi-exclamation-triangle"></i>
            <p>{{ navError }}</p>
          </div>
        } @else {
          <app-file-table
            [folders]="navigation.currentFolderChildren().folders"
            [files]="navigation.currentFolderChildren().files"
            [loading]="isCurrentLoading() || fileSystem.isResolvingPath()"
            (itemDoubleClicked)="onItemDoubleClicked($event)"
          />
        }
      </main>
    </ng-template>
  </p-splitter>

  <footer class="fm-status" aria-live="polite">
    <span>{{ statusText() }}</span>
  </footer>
</div>
