<div class="fm-toolbar">
  <div class="fm-toolbar-left">
    <button
      pButton
      type="button"
      icon="pi pi-arrow-left"
      [disabled]="!canGoBack()"
      (click)="back.emit()"
      pTooltip="Back (Alt+Left)"
      tooltipPosition="bottom"
      [text]="true"
      severity="secondary"
      data-testid="fm-btn-back"
      aria-label="Back"
    ></button>
    <button
      pButton
      type="button"
      icon="pi pi-arrow-right"
      [disabled]="!canGoForward()"
      (click)="forward.emit()"
      pTooltip="Forward (Alt+Right)"
      tooltipPosition="bottom"
      [text]="true"
      severity="secondary"
      data-testid="fm-btn-forward"
      aria-label="Forward"
    ></button>
    <button
      pButton
      type="button"
      icon="pi pi-arrow-up"
      [disabled]="!canGoUp()"
      (click)="up.emit()"
      pTooltip="Parent folder (Alt+Up)"
      tooltipPosition="bottom"
      [text]="true"
      severity="secondary"
      data-testid="fm-btn-up"
      aria-label="Parent folder"
    ></button>
    <span class="fm-divider"></span>
    <button
      pButton
      type="button"
      icon="pi pi-refresh"
      (click)="refresh.emit()"
      pTooltip="Refresh (F5)"
      tooltipPosition="bottom"
      [text]="true"
      severity="secondary"
      data-testid="fm-btn-refresh"
      aria-label="Refresh"
    ></button>
  </div>
</div>
