<div class="pd-toolbar">
  <div class="pd-toolbar-left">
    <button
      pButton
      type="button"
      [disabled]="!canGoBack()"
      (click)="back.emit()"
      pTooltip="Back (Alt+Left)"
      tooltipPosition="bottom"
      [text]="true"
      severity="secondary"
      data-testid="pd-btn-back"
      aria-label="Back"
    >
      <span class="material-symbols-outlined pd-btn-symbol" aria-hidden="true">arrow_back</span>
    </button>
    <button
      pButton
      type="button"
      [disabled]="!canGoForward()"
      (click)="forward.emit()"
      pTooltip="Forward (Alt+Right)"
      tooltipPosition="bottom"
      [text]="true"
      severity="secondary"
      data-testid="pd-btn-forward"
      aria-label="Forward"
    >
      <span class="material-symbols-outlined pd-btn-symbol" aria-hidden="true">arrow_forward</span>
    </button>
    <button
      pButton
      type="button"
      [disabled]="!canGoUp()"
      (click)="up.emit()"
      pTooltip="Parent folder (Alt+Up)"
      tooltipPosition="bottom"
      [text]="true"
      severity="secondary"
      data-testid="pd-btn-up"
      aria-label="Parent folder"
    >
      <span class="material-symbols-outlined pd-btn-symbol" aria-hidden="true">arrow_upward</span>
    </button>
    <span class="pd-divider"></span>
    <button
      pButton
      type="button"
      (click)="refresh.emit()"
      pTooltip="Refresh (F5)"
      tooltipPosition="bottom"
      [text]="true"
      severity="secondary"
      data-testid="pd-btn-refresh"
      aria-label="Refresh"
    >
      <span class="material-symbols-outlined pd-btn-symbol" aria-hidden="true">refresh</span>
    </button>
  </div>
</div>
